runtime: python312

env: standard

entrypoint: gunicorn -b :$PORT wsgi:app

# Attach a Cloud SQL instance (PostgreSQL) to App Engine.
# Replace INSTANCE_CONNECTION_NAME with: PROJECT:REGION:INSTANCE
beta_settings:
  cloud_sql_instances: "YOUR_PROJECT_ID:YOUR_REGION:YOUR_INSTANCE_NAME"

env_variables:
  # Use a Cloud SQL unix socket for Postgres.
  # Replace USER/PASSWORD/DBNAME and INSTANCE_CONNECTION_NAME.
  DATABASE_URL: "postgresql+psycopg://DB_USER:DB_PASSWORD@/DB_NAME?host=/cloudsql/YOUR_PROJECT_ID:YOUR_REGION:YOUR_INSTANCE_NAME"

  # Optional but recommended: restrict which frontend origin can call this API.
  # Example: https://YOUR_PROJECT.web.app
  # FRONTEND_ORIGIN: "https://YOUR_FRONTEND_ORIGIN"
